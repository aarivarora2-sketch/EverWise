name: Deploy EverWise to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build EverWise
        run: npm run build -- --base=/EverWise/
      - name: Fix app paths for GitHub Pages
        run: |
          find dist -type f \( -name '*.js' -o -name '*.html' -o -name '*.webmanifest' \) -exec sed -i 's|"/everwise-|"/EverWise/everwise-|g; s|"/manifest.webmanifest"|"/EverWise/manifest.webmanifest"|g; s|"start_url": "/"|"start_url": "/EverWise/"|g' {} +
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
